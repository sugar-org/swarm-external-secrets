version: '3.8'

services:
  app:
    image: busybox:latest
    command: >
      sh -c "
        while true; do
          echo 'Current secret:'
          cat /run/secrets/smoke_secret
          sleep 2
        done
      "
    secrets:
      - smoke_secret
    deploy:
      replicas: 1
      restart_policy:
        condition: any

secrets:
  smoke_secret:
    driver: swarm-external-secrets:latest
    labels:
      gcp_secret_name: "${GCP_SECRET_NAME}"
      gcp_field: "password"

networks:
  default:
    driver: overlay
