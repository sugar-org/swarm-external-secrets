# .makim.yaml
# ----------------------------------------------------------------------
# Tasks for the shell scripts in the ./scripts directory
# ----------------------------------------------------------------------
backend: bash

groups:
  scripts:
    tasks:
      build:
        help: Build project artifacts
        run: ./scripts/build.sh

      test:
        help: Run end-to-end smoke tests
        run: bash ./scripts/smoke-test-all.sh

      cleanup:
        help: Remove temporary files, containers, and other build artifacts
        run: ./scripts/cleanup.sh

      check_plugin_service:
        help: Health-check the plugin service
        run: ./scripts/check_plugin_service.sh

      docs:
        help: Build documentation
        run:  python3 -m mkdocs build

      linter:
        help: Run linting tools
        run: ./scripts/linter.sh
        
      smoke-test-vault:
        help: Run Vault smoke test to validate plugin end-to-end
        run: bash ./scripts/smoke-test-vault.sh
      smoke-test-openbao:
        help: Run OpenBao smoke test to validate plugin end-to-end
        run: bash ./scripts/smoke-test-openbao.sh
      smoke-test-awssm:
        help: Run AWS Secrets Manager smoke test to validate plugin end-to-end
        run: bash ./scripts/smoke-test-awssm.sh
  ci:
    # Aggregate tasks useful for CI pipelines
    tasks:
      all:
        help: Run the same steps that CI executes
        hooks:
          pre-run:
            - task: scripts.build
            - task: scripts.test
            - task: scripts.check_plugin_service
            - task: scripts.cleanup
            - task: scripts.docs
