name: Build and Release Workflow

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
    paths-ignore:
      - "**/*.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  goreleaser-snapshot:
    permissions:
      contents: read
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@a32d873df9f1ac4dd6f877b8151df33924af8d0f # v5
        with:
          version: "~> v2"
          args: build --clean --snapshot

  build-plugin-test:
    permissions:
      contents: read
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3
      - name: Build plugin image
        run: |
          chmod +x ./scripts/build-plugin.sh
          ./scripts/build-plugin.sh "swarm-external-secrets:test" "test-org/swarm-external-secrets:test"
      - name: Save plugin image artifact
        if: github.event_name == 'push'
        run: |
          docker save --output /tmp/swarm-external-secrets-plugin.tar swarm-external-secrets:test
      - name: Upload plugin image artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@7d27270e0cfd253e666c44abac0711308d2d042f # v6.0.0
        with:
          name: plugin-image
          path: /tmp/swarm-external-secrets-plugin.tar

  tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - goreleaser-snapshot
      - build-plugin-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      # Artifact is produced by build-plugin-test (docker save of swarm-external-secrets:test).
      # Load + inspect so tagging is gated on a reproducible, non-corrupt image tarball.
      - name: Download plugin image artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: plugin-image
          path: ./ci-artifacts

      - name: Verify plugin image artifact
        run: |
          set -euo pipefail
          tar="$(find ./ci-artifacts -name 'swarm-external-secrets-plugin.tar' -type f -print -quit)"
          test -n "$tar"
          docker load -i "$tar"
          docker image inspect swarm-external-secrets:test --format 'verified image {{.Id}}'

      - uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8 # 1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
          DEFAULT_BRANCH: main
          DEFAULT_BUMP: patch
          RELEASE_BRANCHES: main
          TAG_PREFIX: v

  goreleaser:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5
        with:
          go-version-file: go.mod

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610

      - name: Run GoReleaser
        id: run-goreleaser
        uses: goreleaser/goreleaser-action@5742e2a039330cbb23ebf35f046f814d4c6ff811 # v5
        with:
          distribution: goreleaser
          version: "v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dist folder
        uses: actions/upload-artifact@7d27270e0cfd253e666c44abac0711308d2d042f # v6.0.0
        with:
          name: dist-artifacts
          path: dist/

  provenance:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - goreleaser
    permissions:
      actions: read
      id-token: write
      attestations: write
      artifact-metadata: write
    runs-on: ubuntu-latest
    steps:
      - name: Download dist folder
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: dist-artifacts
          path: dist/

      - name: Attest build provenance (checksums)
        uses: actions/attest-build-provenance@00014ed6ed5efc5b1ab7f7f34a39eb55d41aa4f8 # v3.1.0
        with:
          subject-checksums: dist/checksums.txt

  docker-plugin:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Publish Docker Plugin
    needs:
      - build-plugin-test
      - goreleaser
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download plugin image artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: plugin-image
          path: /tmp

      - name: Load plugin image artifact and create versioned plugin
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "GHCR_BASE=ghcr.io/${OWNER_LC}/swarm-external-secrets" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          docker load -i /tmp/swarm-external-secrets-plugin.tar

          rm -rf ./plugin/rootfs
          mkdir -p ./plugin/rootfs
          docker create --name plugin-rootfs swarm-external-secrets:test
          docker export plugin-rootfs | tar -x -C ./plugin/rootfs
          docker rm plugin-rootfs
          cp config.json ./plugin/
          docker plugin create "ghcr.io/${OWNER_LC}/swarm-external-secrets:${VERSION}" ./plugin

      - name: Push plugin to registries
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail
          GHCR="${GHCR_BASE}"

          # Version tag was created by build-plugin.sh; push it before any further create.
          docker plugin push "${GHCR}:${VERSION}"

          docker plugin create "${GHCR}:latest" ./plugin
          docker plugin push "${GHCR}:latest"

          if [ -n "${DOCKERHUB_USERNAME}" ]; then
            DHR="${DOCKERHUB_USERNAME}/swarm-external-secrets"
            docker plugin create "${DHR}:${VERSION}" ./plugin
            docker plugin push "${DHR}:${VERSION}"
            docker plugin create "${DHR}:latest" ./plugin
            docker plugin push "${DHR}:latest"
          fi
