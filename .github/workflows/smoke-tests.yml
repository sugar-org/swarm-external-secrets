name: Smoke Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        provider: [vault, openbao]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Init Docker Swarm
        run: docker swarm init

      - name: Run smoke test for ${{ matrix.provider }}
        run: bash scripts/tests/smoke-test-${{ matrix.provider }}.sh

  smoke-test-awssm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Start LocalStack
        uses: LocalStack/setup-localstack@7bc0b195ea4bef7a215f1ec0f71e41fedc6f0e15 # v0.2.2
        with:
          image-tag: 'latest'
          install-awslocal: 'true'

      - name: Init Docker Swarm
        run: docker swarm init

      - name: Run smoke test for awssm
        run: bash scripts/tests/smoke-test-awssm.sh
        