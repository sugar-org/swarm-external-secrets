name: Tag Release

on:
  workflow_run:
    workflows: ["Smoke Tests"]
    types: [completed]
    branches: [main]

jobs:
  tag:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Find matching CI run
        id: ci-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          ci_run_id="$(
            gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${HEAD_SHA}&event=push&status=completed&per_page=10" \
              --jq '.workflow_runs[] | select(.conclusion == "success") | .id' | head -n 1
          )"

          if [ -z "${ci_run_id}" ]; then
            echo "No successful CI run found for ${HEAD_SHA}" >&2
            exit 1
          fi

          echo "ci_run_id=${ci_run_id}" >> "${GITHUB_OUTPUT}"

      - name: Download plugin image artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ./ci-artifacts
          gh run download "${{ steps.ci-run.outputs.ci_run_id }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --name plugin-image \
            --dir ./ci-artifacts

      - name: Load plugin image artifact
        run: |
          docker load --input ./ci-artifacts/swarm-external-secrets-plugin.tar
          docker image inspect swarm-external-secrets:test >/dev/null

      - uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8 # 1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
          DEFAULT_BRANCH: main
          DEFAULT_BUMP: patch
          RELEASE_BRANCHES: main
          TAG_PREFIX: v
